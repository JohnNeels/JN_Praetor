name: PRAETOR Enterprise CI/CD

on:
  push:
    branches: [main, develop, release/*]
  pull_request:
    branches: [main, develop]
  release:
    types: [published]

env:
  REGISTRY: registry.your-org.com/praetor
  HELM_VERSION: "3.14.0"
  OCP_CLUSTER: "ocp-prod-01.your-org.com"

jobs:
  # ──────────────────────────────────────────────
  # LINT & VALIDATE
  # ──────────────────────────────────────────────
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff mypy yamllint safety bandit
          pip install -r src/orchestrator/requirements.txt
          pip install -r src/agents/requirements.txt
          pip install -r src/mcp-gateway/requirements.txt
          pip install -r src/budget-controller/requirements.txt

      - name: Lint Python (ruff)
        run: ruff check src/

      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports

      - name: Lint YAML configs
        run: yamllint config/ helm/

      - name: Security scan (bandit)
        run: bandit -r src/ -ll -ii

      - name: Dependency vulnerability scan (safety)
        run: safety check --full-report
        continue-on-error: true   # Report but don't block on known false positives

      - name: Validate Helm chart
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}
      - run: |
          helm lint helm/praetor/
          helm template praetor helm/praetor/ -f helm/praetor/values.yaml | \
            kubectl --dry-run=client apply -f - 2>&1 || true

      - name: Validate ACL config integrity
        run: python scripts/validate-acl.py config/tool-acl.yaml

  # ──────────────────────────────────────────────
  # UNIT & INTEGRATION TESTS
  # ──────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: praetor_test
        ports: ["5432:5432"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          pip install pytest pytest-asyncio pytest-cov httpx
          pip install -r src/orchestrator/requirements.txt
          pip install -r src/agents/requirements.txt
          pip install -r src/mcp-gateway/requirements.txt
          pip install -r src/budget-controller/requirements.txt

      - name: Run tests
        env:
          REDIS_HOST: localhost
          REDIS_PASSWORD: ""
          ANTHROPIC_API_KEY: "test-key-not-real"
          TOTAL_PTU: "40"
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=75

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: coverage.xml

  # ──────────────────────────────────────────────
  # CONTAINER BUILD
  # ──────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'
    strategy:
      matrix:
        service:
          - orchestrator
          - mcp-gateway
          - budget-controller
          - agent-runtime
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: registry.your-org.com
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: src/${{ matrix.service }}
          file: src/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.service }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ matrix.service }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ matrix.service }}:latest
          cache-to: type=inline
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ matrix.service }}:${{ steps.tag.outputs.tag }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: 1   # Fail on critical/high CVEs

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif

  # ──────────────────────────────────────────────
  # DEPLOY TO STAGING
  # ──────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Login to OpenShift (Staging)
        run: |
          oc login ${{ env.OCP_CLUSTER }} \
            --token=${{ secrets.OCP_STAGING_TOKEN }} \
            --insecure-skip-tls-verify=false

      - name: Deploy to staging
        run: |
          helm upgrade --install praetor ./helm/praetor \
            -f helm/praetor/values.yaml \
            -f k8s/overlays/staging/values.yaml \
            --namespace praetor-staging \
            --create-namespace \
            --set global.imageTag=sha-$(git rev-parse --short HEAD) \
            --atomic \
            --timeout 10m \
            --wait

      - name: Run smoke tests
        run: |
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=praetor \
            -n praetor-staging \
            --timeout=300s
          bash scripts/smoke-test.sh praetor-staging

  # ──────────────────────────────────────────────
  # DEPLOY TO PRODUCTION (Release only)
  # ──────────────────────────────────────────────
  deploy-prod:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'release'
    environment: production   # Requires manual approval in GitHub
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Login to OpenShift (Production)
        run: |
          oc login ${{ env.OCP_CLUSTER }} \
            --token=${{ secrets.OCP_PROD_TOKEN }} \
            --insecure-skip-tls-verify=false

      - name: Deploy to production
        run: |
          helm upgrade --install praetor ./helm/praetor \
            -f helm/praetor/values.yaml \
            -f helm/praetor/values-prod.yaml \
            --namespace praetor \
            --create-namespace \
            --set global.imageTag=${{ github.event.release.tag_name }} \
            --atomic \
            --timeout 15m \
            --wait

      - name: Post-deploy health check
        run: bash scripts/smoke-test.sh praetor

      - name: Notify Teams on success
        if: success()
        run: |
          curl -H 'Content-Type: application/json' \
            -d '{"text":"✅ PRAETOR ${{ github.event.release.tag_name }} deployed to production"}' \
            ${{ secrets.TEAMS_WEBHOOK }}

      - name: Notify Teams on failure
        if: failure()
        run: |
          curl -H 'Content-Type: application/json' \
            -d '{"text":"🚨 PRAETOR production deployment FAILED — ${{ github.event.release.tag_name }}"}' \
            ${{ secrets.TEAMS_WEBHOOK }}
