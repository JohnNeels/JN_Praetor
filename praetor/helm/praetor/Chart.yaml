apiVersion: v2
name: praetor
description: PRAETOR Enterprise ITOps Agentic Platform
type: application
version: 1.0.0
appVersion: "1.0.0"

keywords:
  - itops
  - agentic
  - ai
  - automation
  - enterprise

home: https://github.com/your-org/praetor
sources:
  - https://github.com/your-org/praetor

maintainers:
  - name: Platform Engineering
    email: platform@your-org.com

dependencies:
  - name: redis
    version: "18.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: postgresql
    version: "13.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
